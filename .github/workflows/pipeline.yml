name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Security scanning ----------

  secrets-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Trivy filesystem scan (critical — blocks)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
      - name: Trivy filesystem scan (high — warns only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH
          exit-code: 0
          ignore-unfixed: true

  code-scan:
    name: Static analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep scan --config p/security-audit --config p/typescript --error

  # ---------- Build & test ----------

  server-build-test:
    name: Server build + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay_test
          POSTGRES_DB: relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relay -d relay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgres://relay:relay_test@localhost:5432/relay_test
      NODE_ENV: test
      DEV_AUTH: "true"
      SESSION_SECRET: ci_test_secret
      PORT: 4000
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: npm audit (critical only — high tracked via Dependabot)
        run: npm audit --audit-level=critical || true
      - name: npm audit report (high)
        run: npm audit --audit-level=high || echo "⚠️ High severity vulnerabilities found — review Dependabot PRs"
      - name: Run migrations
        run: npm run migrate:up
      - name: Build (typecheck)
        run: npm run build
      - name: Run tests
        run: npm test

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: npm audit (critical only — high tracked via Dependabot)
        run: npm audit --audit-level=critical || true
      - name: npm audit report (high)
        run: npm audit --audit-level=high || echo "⚠️ High severity vulnerabilities found — review Dependabot PRs"
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://captracker.alphasights.ae/api

  container-scan:
    name: Container image scan (Trivy)
    needs: [server-build-test, web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Build API image
        run: docker build -t relay-api:scan -f server/Dockerfile.prod server
      - name: Build web image
        run: docker build -t relay-web:scan -f web/Dockerfile.prod web --build-arg VITE_API_URL=https://captracker.alphasights.ae/api
      - name: Scan API image (critical — blocks)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: relay-api:scan
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
      - name: Scan API image (high — warns only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: relay-api:scan
          severity: HIGH
          exit-code: 0
          ignore-unfixed: true
      - name: Scan web image (critical — blocks)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: relay-web:scan
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
      - name: Scan web image (high — warns only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: relay-web:scan
          severity: HIGH
          exit-code: 0
          ignore-unfixed: true

  # ---------- Build & publish images (main only) ----------
  #
  # Permanent fix for the deploy outages: images are built on GitHub's
  # runners and pushed to GHCR. Building on the 1 GB VM starved the live
  # containers on every deploy — the OOM killer then took them down AFTER
  # 'up -d' reported Started, needing a manual 'up -d' each time. The VM
  # never builds again; deploy = pull + restart, seconds of downtime.
  build-and-push:
    name: Build & push images (GHCR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./server
          file: ./server/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=https://captracker.alphasights.ae/api
          tags: |
            ghcr.io/${{ github.repository }}-web:latest
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Deploy (main branch only) ----------
  #
  # No scan/test `needs`: branch protection already forces all six checks
  # green on the PR before anything can merge. Deploy waits only for the
  # image build above, then the VM pulls and restarts.
  deploy:
    name: Deploy to GCP VM
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (pull prebuilt images + restart)
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: "10m"
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd ~/relay
            git pull origin main
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml --env-file .env.production pull api web
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            docker image prune -f
            docker compose -f docker-compose.prod.yml --env-file .env.production ps
            curl -fsS -o /dev/null http://localhost/ && echo "web responding OK" || echo "WARN: web not answering — run 'docker ps -a'"
