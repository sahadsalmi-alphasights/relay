services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    # Pulled prebuilt from GHCR by the deploy (built on GitHub's runners —
    # never on this 1 GB VM). `build:` kept only as an emergency fallback:
    # `docker compose ... build api` still works if the registry is out.
    image: ghcr.io/sahadsalmi-alphasights/relay-api:latest
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      DEV_AUTH: ${DEV_AUTH}
      SESSION_SECRET: ${SESSION_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      # User management — owner allowlist. Read in config.ts but was never
      # passed through, so the allowlist was always empty in production.
      OWNER_EMAILS: ${OWNER_EMAILS:-}
    expose:
      - "4000"

  web:
    image: ghcr.io/sahadsalmi-alphasights/relay-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    # Container port is 8080 now: the image is nginx-unprivileged (non-root
    # nginx can't bind 80 inside the container). Host side stays 80, so the
    # Cloudflare tunnel's http://localhost/ origin needs no change.
    ports:
      - "80:8080"

volumes:
  db_data:
