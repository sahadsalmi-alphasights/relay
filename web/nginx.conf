server {
    # 8080, not 80: the runtime image is nginxinc/nginx-unprivileged, which
    # runs as a non-root user and therefore can't bind a privileged port.
    # docker-compose.prod.yml still publishes it on host port 80.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers. Declared at server level so both the SPA and the
    # proxied /api responses get them (neither location block declares its
    # own add_header, which would otherwise shadow these).
    # HSTS: TLS terminates at Cloudflare, but the header passes through to
    # the browser, which is where it matters.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # script-src 'self' works because the Vite build emits no inline scripts;
    # style-src needs 'unsafe-inline' for React style attributes; connect-src
    # wss: covers the live-update socket; img-src data: covers inline icons.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location /api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
